name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and test in Docker
        run: |
          docker build \
            --build-arg WASMTIME_VERSION=44.0.0 \
            -t vmod-wasm-test .
          docker run --rm vmod-wasm-test make check
